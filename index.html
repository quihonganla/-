    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>歡迎來到您的專屬旅遊規劃師</h1>

                    <p>陽光與海灘的季節，適合水上活動與避暑。</p>
                </div>
                <div class="card season-card" data-season="秋季 (Autumn)">
                    <h3>🍁 秋季 Autumn</h3>
                    <p>楓紅與秋高氣爽的時節，適合登高望遠。</p>
                </div>
                <div class="card season-card" data-season="冬季 (Winter)">
                    <h3>❄️ 冬季 Winter</h3>
                    <p>銀白雪景與溫泉的季節，適合享受冬日浪漫。</p>
